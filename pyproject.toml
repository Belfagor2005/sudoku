[tool.ruff]
builtins = ["_", "ngettext", "pgettext"]

[tool.ruff.lint]
select = ["E","F","W"]
ignore = ["W191","E501"]

[tool.isort]
profile = "black"
line_length = 1000
force_sort_within_sections = true
combine_as_imports = true
lines_between_types = 0
case_sensitive = true
multi_line_output = 0
force_single_line = false
include_trailing_comma = false
default_section = "THIRDPARTY"
sections = ["STDLIB", "ENIGMA", "THIRDPARTY", "FIRSTPARTY", "LOCALFOLDER"]
known_enigma = ["enigma"]
known_third_party = ["Components", "Screens", "Tools"]
known_first_party = ["Plugins"]
no_lines_before = ["STDLIB","ENIGMA","THIRDPARTY","FIRSTPARTY"]
order_by_type = false
